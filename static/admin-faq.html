<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin FAQ</title>
  <style>
    :root{--bg:#0a1220;--panel:#111b2c;--line:#22314a;--text:#edf3ff;--muted:#95a7c7;--accent:#38bdf8;--radius:16px}
    *{box-sizing:border-box} body{margin:0;font-family:Segoe UI,system-ui,sans-serif;background:var(--bg);color:var(--text)}
    .top{position:sticky;top:0;background:rgba(10,18,32,.92);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.06)}
    .top-inner,.wrap{max-width:1100px;margin:0 auto;padding:16px}
    .top-inner{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    button,a.btn,select{border:0;border-radius:12px;padding:10px 14px;font:inherit}
    button,a.btn{cursor:pointer;text-decoration:none}
    select,textarea{background:#0d1524;color:var(--text);border:1px solid rgba(255,255,255,.1)}
    .primary{background:linear-gradient(135deg,var(--accent),#6366f1);color:#08111d;font-weight:900}
    .secondary{background:var(--panel);color:var(--text);border:1px solid rgba(255,255,255,.08)}
    .card{background:var(--panel);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);overflow:hidden}
    .card-h,.bar{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}
    .bar{border-top:1px solid rgba(255,255,255,.06);border-bottom:0}
    textarea{width:100%;min-height:65vh;padding:16px;border:0;outline:none;resize:vertical;font-family:Consolas,monospace;font-size:12px;line-height:1.45}
    .meta,.status{color:var(--muted);font-size:13px}
  </style>
</head>
<body>
  <div class="top">
    <div class="top-inner">
      <div>
        <div style="font-weight:900">Admin FAQ</div>
        <div class="meta" id="sessionMeta">Chargement...</div>
      </div>
      <div class="actions">
        <a class="btn secondary" href="/admin">Conversations</a>
        <select id="brandSelect"></select>
        <button class="secondary" id="btnLoad">Charger</button>
        <button class="primary" id="btnSave">Enregistrer</button>
        <button class="secondary" id="btnLogout">Deconnexion</button>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div class="card">
      <div class="card-h">
        <div>Editeur JSON</div>
        <div class="meta" id="meta">-</div>
      </div>
      <textarea id="editor" spellcheck="false"></textarea>
      <div class="bar">
        <div class="status" id="status">Pret.</div>
        <div class="actions">
          <button class="secondary" id="btnPretty">Formatter</button>
          <button class="secondary" id="btnValidate">Valider</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const state = { csrfToken: "", username: "" };

    async function api(path, options = {}) {
      const headers = Object.assign({}, options.headers || {});
      if (state.csrfToken && ["POST", "PUT", "DELETE"].includes((options.method || "GET").toUpperCase())) {
        headers["X-CSRF-Token"] = state.csrfToken;
      }
      const response = await fetch(path, Object.assign({ credentials: "same-origin" }, options, { headers }));
      const data = await response.json().catch(() => null);
      if (!response.ok) throw new Error((data && (data.error || data.message)) || ("HTTP " + response.status));
      return data;
    }

    function setStatus(message) { $("status").textContent = message; }

    async function loadSession() {
      const data = await api("/admin/api/session");
      if (!data.authenticated) {
        location.href = "/admin/login";
        return;
      }
      state.csrfToken = data.csrf_token;
      state.username = data.username;
      $("sessionMeta").textContent = `Connecte en tant que ${data.username}`;
    }

    async function loadBrands() {
      const data = await api("/admin/api/brands?faq_only=1");
      $("brandSelect").innerHTML = "";
      (data.brands || []).forEach((brand) => {
        const option = document.createElement("option");
        option.value = brand.id;
        option.textContent = brand.display_name || brand.name || brand.id;
        $("brandSelect").appendChild(option);
      });
    }

    function currentBrand() { return $("brandSelect").value || "retroworld"; }

    async function loadFaq() {
      setStatus("Chargement...");
      const data = await api("/admin/api/faq/" + encodeURIComponent(currentBrand()));
      $("editor").value = JSON.stringify(data, null, 2);
      $("meta").textContent = `brand=${data.brand} | items=${(data.items || []).length}`;
      setStatus("Charge.");
    }

    async function saveFaq() {
      setStatus("Validation...");
      const payload = JSON.parse($("editor").value || "{}");
      setStatus("Enregistrement...");
      const data = await api("/admin/api/faq/" + encodeURIComponent(currentBrand()), {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      $("editor").value = JSON.stringify(data, null, 2);
      $("meta").textContent = `brand=${data.brand} | items=${(data.items || []).length}`;
      setStatus("Enregistre.");
    }

    $("btnLoad").addEventListener("click", () => loadFaq().catch((error) => setStatus("Erreur: " + error.message)));
    $("btnSave").addEventListener("click", () => saveFaq().catch((error) => setStatus("Erreur: " + error.message)));
    $("btnPretty").addEventListener("click", () => {
      try { $("editor").value = JSON.stringify(JSON.parse($("editor").value || "{}"), null, 2); setStatus("JSON formate."); }
      catch (error) { setStatus("JSON invalide: " + error.message); }
    });
    $("btnValidate").addEventListener("click", () => {
      try { JSON.parse($("editor").value || "{}"); setStatus("JSON valide."); }
      catch (error) { setStatus("JSON invalide: " + error.message); }
    });
    $("btnLogout").addEventListener("click", async () => { await api("/admin/api/auth/logout", { method: "POST" }); location.href = "/admin/login"; });

    (async function init() {
      try {
        await loadSession();
        await loadBrands();
        await loadFaq();
      } catch (error) {
        setStatus("Erreur: " + error.message);
      }
    })();
  </script>
</body>
</html>
