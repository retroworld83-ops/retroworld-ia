<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Centre de messages Retroworld IA</title>
  <style>
    :root{
      --bg:#050911;--panel:#0a111c;--panel2:#101927;--panel3:#182231;
      --line:#263344;--text:#f8fbff;--muted:#aeb8c8;--soft:#778499;
      --retro:#8b5cf6;--retro2:#14b8ff;--run:#ff6532;--blue:#38bdf8;
      --good:#38d978;--warn:#ffb74a;--bad:#ff5d5d;--radius:12px
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;background:var(--bg);color:var(--text);font-family:Segoe UI,system-ui,sans-serif;font-size:15px;line-height:1.45;overflow:hidden}
    button,a.btn,select,input,textarea{font:inherit}
    button,a.btn{min-height:42px;border:0;border-radius:10px;padding:10px 14px;font-weight:850;cursor:pointer;text-decoration:none}
    .primary{background:linear-gradient(135deg,var(--retro),var(--retro2));color:white}
    .secondary{background:#121c2a;color:var(--text);border:1px solid var(--line)}
    .topbar{height:76px;display:grid;grid-template-columns:370px minmax(280px,1fr) auto;gap:24px;align-items:center;padding:0 18px;border-bottom:1px solid #111a27;background:#050911}
    .brand-title h1{margin:0;font-size:28px;line-height:1;font-weight:1000;letter-spacing:-.02em}
    .brand-line{margin-top:8px;font-size:18px;font-weight:900;color:white}
    .brand-retro{color:#9f7cff}.brand-run{color:#ff7b42}
    .global-search{height:54px;border:1px solid var(--line);background:#0a111c;border-radius:12px;display:flex;align-items:center;gap:14px;padding:0 18px;color:var(--muted)}
    .global-search svg{width:22px;height:22px;stroke:var(--muted);flex:0 0 auto}
    .global-search input{width:100%;border:0;outline:0;background:transparent;color:var(--text);font-size:16px}
    .top-actions{display:flex;gap:10px;align-items:center;justify-content:flex-end;flex-wrap:wrap}
    .workspace{height:calc(100vh - 76px);display:grid;grid-template-columns:360px minmax(0,1fr);gap:8px;padding:0 8px 8px}
    .sidebar,.chat-panel{min-height:0;background:linear-gradient(180deg,#0b121d,#060b13);border:1px solid var(--line)}
    .sidebar{border-radius:0 0 12px 12px;display:flex;flex-direction:column;overflow:hidden}
    .sidebar-head{height:58px;padding:0 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #182232}
    .sidebar-head strong{font-size:16px}
    .sidebar-head select{background:transparent;border:0;color:var(--muted);outline:0;max-width:150px}
    .list{min-height:0;overflow:auto;padding:8px;display:grid;gap:6px}
    .item{position:relative;display:grid;grid-template-columns:54px minmax(0,1fr) auto;gap:10px;align-items:start;padding:14px 12px;border-radius:10px;border:1px solid #172232;background:#0b121d;cursor:pointer;min-height:108px}
    .item:hover,.item.active{background:#101a29;border-color:#364866}
    .item.active{box-shadow:inset 0 0 0 1px var(--retro),0 0 0 1px rgba(20,184,255,.45)}
    .avatar{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;background:#271b48;border:2px solid var(--retro);font-weight:1000;font-size:18px;position:relative}
    .avatar.runningman{background:#33170f;border-color:var(--run)}
    .avatar.assistant{background:#1b2652;border-color:#536dff}
    .avatar:after{content:"";position:absolute;right:-3px;bottom:4px;width:12px;height:12px;border-radius:50%;background:var(--retro);border:2px solid #0b121d}
    .avatar.runningman:after{background:var(--run)}
    .avatar.assistant:after{background:var(--blue)}
    .conv-main{min-width:0}
    .conv-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .conv-name{font-size:18px;font-weight:1000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .conv-time{font-size:13px;color:#c5cfdd}
    .conv-brand{margin-top:2px;font-size:14px;font-weight:900}
    .conv-brand.retroworld{color:#9f7cff}.conv-brand.runningman{color:#ff7b42}.conv-brand.enigmaniac{color:#38d978}
    .conv-preview{margin-top:6px;color:#c3ccd9;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .conv-pill{align-self:center;min-width:22px;height:22px;border-radius:999px;background:linear-gradient(135deg,var(--retro),#4f46e5);display:grid;place-items:center;font-size:12px;font-weight:1000}
    .chat-panel{border-radius:0 0 12px 12px;display:grid;grid-template-rows:88px minmax(0,1fr) auto;overflow:hidden}
    .chat-head{padding:0 18px;border-bottom:1px solid #182232;display:flex;align-items:center;justify-content:space-between;gap:16px}
    .chat-person{display:flex;align-items:center;gap:14px;min-width:0}
    .chat-title-row{display:flex;align-items:center;gap:10px;min-width:0;flex-wrap:wrap}
    .chat-name{font-size:18px;font-weight:1000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .brand-badge{display:inline-flex;align-items:center;height:28px;padding:0 10px;border-radius:8px;background:#241b55;color:#bda7ff;font-weight:900}
    .brand-badge.runningman{background:#3a1b11;color:#ff9b70}
    .brand-badge.enigmaniac{background:#123227;color:#79edb2}
    .chat-sub{color:var(--muted);margin-top:3px}
    .chat-icons{display:flex;gap:8px}
    .icon-btn{width:42px;height:42px;display:grid;place-items:center;border-radius:10px;background:transparent;color:#cdd7e7;border:0;font-size:22px}
    .thread{min-height:0;overflow:auto;padding:18px;display:flex;flex-direction:column;gap:18px;background:linear-gradient(180deg,#07101b,#060a12)}
    .empty{padding:28px;color:var(--muted)}
    .message-row{display:grid;grid-template-columns:48px minmax(0,680px) 48px;gap:10px;align-items:end}
    .message-row.outgoing{justify-content:end}
    .message-row.outgoing .avatar{grid-column:3}
    .message-row.outgoing .bubble{grid-column:2;grid-row:1;justify-self:end}
    .message-row.incoming .bubble{grid-column:2}
    .bubble{position:relative;padding:14px 16px;border-radius:10px;line-height:1.48;white-space:pre-wrap;border:1px solid #344054;background:#17202c;color:#f5f7fb;box-shadow:0 12px 28px rgba(0,0,0,.18)}
    .bubble.assistant{max-width:560px;background:linear-gradient(180deg,#11182a,#0d1424);border-color:#754aff;box-shadow:0 0 0 1px rgba(20,184,255,.35)}
    .bubble.user{max-width:460px}
    .bubble-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:8px;font-size:12px;color:#aeb8c8}
    .seen{color:#20d8ff;font-weight:900}
    .correction-dock{border-top:1px solid #1c2737;background:#08101b;display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:12px;padding:12px 16px}
    .reply-tools{display:grid;gap:10px}
    .reply-tools textarea{width:100%;min-height:70px;resize:vertical;border:1px solid var(--line);border-radius:10px;background:#0f1825;color:var(--text);padding:12px}
    .tool-row{display:flex;gap:8px;flex-wrap:wrap}
    .field-grid{display:grid;grid-template-columns:1fr 100px;gap:8px}
    .field{display:grid;gap:6px}
    .field span{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:#cbd5e1;font-weight:900}
    .field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:10px;background:#0f1825;color:var(--text);padding:10px 11px}
    .side-tools{display:grid;gap:10px}
    .correction-list{max-height:112px;overflow:auto;display:grid;gap:8px}
    .lead,.mini-card{border:1px solid #263344;background:#0f1825;border-radius:10px;padding:10px 11px}
    .mini{font-size:12px;color:var(--muted)}
    .hot{color:#8af0a8}.warm{color:#ffe08a}.cold{color:#8fbfff}
    details.admin-drawer{border-top:1px solid #1c2737;background:#080f18}
    details.admin-drawer summary{cursor:pointer;padding:12px 16px;color:#dce8f8;font-weight:900}
    .drawer-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;padding:0 16px 16px}
    .kpis{grid-column:1/-1;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
    .kpi,.subcard{border:1px solid #263344;background:#0f1825;border-radius:10px;padding:12px}
    .kpi .label{font-size:12px;color:var(--muted)}.kpi .value{font-size:26px;font-weight:1000;margin-top:4px}
    .split{grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .lead-list{display:grid;gap:8px;margin-top:8px}
    pre{margin:0;white-space:pre-wrap;font-family:Consolas,monospace;font-size:11px;color:#cdd9f0}
    @media (max-width:1120px){
      body{overflow:auto}.topbar{height:auto;grid-template-columns:1fr;padding:14px;gap:12px}.workspace{height:auto;grid-template-columns:1fr}.sidebar{max-height:380px}.chat-panel{min-height:720px}.correction-dock{grid-template-columns:1fr}.drawer-grid,.split{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand-title">
      <h1>Centre de messages</h1>
      <div class="brand-line"><span class="brand-retro">Retroworld</span> &amp; <span class="brand-run">Runningman</span></div>
    </div>
    <label class="global-search">
      <svg viewBox="0 0 24 24" fill="none"><path d="M10.8 18.2a7.4 7.4 0 1 1 0-14.8 7.4 7.4 0 0 1 0 14.8Zm5.3-2.1 4.5 4.5" stroke-width="2" stroke-linecap="round"/></svg>
      <input id="searchInput" placeholder="Rechercher un message, un client..." />
    </label>
    <div class="top-actions">
      <a class="btn secondary" href="/admin/faq">FAQ</a>
      <a class="btn secondary" href="/admin/knowledge">Base métier</a>
      <button class="secondary" id="btnExport">Export CSV</button>
      <button class="secondary" id="btnLogout">Déconnexion</button>
      <button class="primary" id="btnRefresh">Rafraîchir</button>
    </div>
  </header>

  <main class="workspace">
    <aside class="sidebar">
      <div class="sidebar-head">
        <strong>Conversations</strong>
        <select id="flagFilter">
          <option value="all">Toutes</option>
          <option value="a_valider">À valider</option>
          <option value="devis">Devis</option>
          <option value="reservation">Réservation</option>
          <option value="reclamation">Réclamation</option>
          <option value="croise">Croisé</option>
          <option value="promesse_resa">Promesse résa</option>
        </select>
      </div>
      <div class="list" id="conversationList"></div>
    </aside>

    <section class="chat-panel">
      <header class="chat-head">
        <div class="chat-person">
          <div class="avatar" id="activeAvatar">IA</div>
          <div>
            <div class="chat-title-row">
              <div class="chat-name" id="activeName">Aucune conversation</div>
              <span class="brand-badge" id="activeBrand">Retroworld</span>
            </div>
            <div class="chat-sub" id="activeSubtitle">Conversation via Chatbot</div>
          </div>
        </div>
        <div class="chat-icons">
          <button class="icon-btn" title="Tag">◇</button>
          <button class="icon-btn" title="Important">☆</button>
          <button class="icon-btn" title="Options">⋮</button>
        </div>
      </header>

      <div class="thread" id="thread"></div>

      <section>
        <div class="correction-dock">
          <div class="reply-tools">
            <div class="field">
              <span>Réponse corrigée</span>
              <textarea id="correctionAnswer" placeholder="Réponse exacte que l'assistant devra suivre"></textarea>
            </div>
            <div class="tool-row">
              <button class="secondary" id="btnUseLastUser">Reprendre la question</button>
              <button class="secondary" id="btnUseLastAssistant">Reprendre la réponse</button>
              <button class="primary" id="btnSaveCorrection">Enregistrer correction</button>
            </div>
            <div class="mini" id="correctionStatus">Prêt.</div>
          </div>
          <div class="side-tools">
            <div class="field-grid">
              <label class="field"><span>Marque</span><select id="correctionBrand"></select></label>
              <label class="field"><span>Priorité</span><input id="correctionPriority" type="number" min="0" max="100" value="60" title="Priorité" /></label>
            </div>
            <label class="field"><span>Déclencheur</span><textarea id="correctionTrigger" placeholder="Question client ou sujet à reconnaître"></textarea></label>
            <label class="field"><span>Note interne</span><input id="correctionNotes" placeholder="Contexte optionnel" /></label>
            <div class="correction-list" id="correctionList"></div>
            <div class="mini">Corrections <span id="correctionBadge">0</span></div>
          </div>
        </div>

        <details class="admin-drawer">
          <summary>Dashboard et outils admin</summary>
          <div class="drawer-grid">
            <div class="kpis" id="kpis"></div>
            <div class="split">
              <div class="subcard"><div class="mini">Par marque</div><pre id="brandsStats">-</pre></div>
              <div class="subcard"><div class="mini">Par flag</div><pre id="flagsStats">-</pre></div>
              <div class="subcard"><div class="mini">Leads récents</div><div class="lead-list" id="leadList"></div></div>
              <div class="subcard"><div class="mini">Logs récents</div><pre id="recentLogs">-</pre></div>
              <div class="subcard">
                <div class="mini">Utilisateurs admin</div>
                <div class="lead-list" id="userList"></div>
                <div style="display:grid;gap:8px;margin-top:12px">
                  <input id="newUserName" placeholder="Nouvel utilisateur" style="background:#0f1825;color:var(--text);border:1px solid var(--line);border-radius:10px;padding:10px 12px" />
                  <input id="newUserPassword" type="password" placeholder="Mot de passe" style="background:#0f1825;color:var(--text);border:1px solid var(--line);border-radius:10px;padding:10px 12px" />
                  <button class="primary" id="btnCreateUser">Créer l'utilisateur</button>
                </div>
              </div>
            </div>
          </div>
        </details>
      </section>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const state = { csrfToken: "", username: "", conversations: [], filtered: [], activeId: "", activeConversation: null, brands: [], corrections: [] };

    async function api(path, options = {}) {
      const headers = Object.assign({}, options.headers || {});
      if (state.csrfToken && ["POST", "PUT", "DELETE"].includes((options.method || "GET").toUpperCase())) headers["X-CSRF-Token"] = state.csrfToken;
      const response = await fetch(path, Object.assign({ credentials: "same-origin" }, options, { headers }));
      const data = await response.json().catch(() => null);
      if (!response.ok) throw new Error((data && (data.error || data.message)) || ("HTTP " + response.status));
      return data;
    }

    function escapeHtml(value) {
      return String(value || "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");
    }

    function brandClass(brandId) {
      return ["retroworld", "runningman", "enigmaniac"].includes(brandId || "") ? brandId : "retroworld";
    }

    function brandLabel(brandId) {
      if (brandId === "runningman") return "Runningman";
      if (brandId === "enigmaniac") return "Enigmaniac";
      return "Retroworld";
    }

    function roleLabel(role) {
      if (role === "user") return "Client";
      if (role === "assistant") return "Assistant";
      return role || "-";
    }

    function initialsFor(value, fallback = "IA") {
      const clean = String(value || "").replace(/[^a-zA-Z0-9 ]/g, " ").trim();
      if (!clean) return fallback;
      const parts = clean.split(/\s+/).filter(Boolean);
      if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
      return clean.slice(0, 2).toUpperCase();
    }

    function displayName(item) {
      const metaName = item.user_id || "";
      if (metaName) return metaName;
      return "Conversation " + String(item.id || "").replace(/^../, "").slice(0, 6).toUpperCase();
    }

    function applyFilters() {
      const query = ($("searchInput").value || "").trim().toLowerCase();
      const flag = $("flagFilter").value;
      state.filtered = state.conversations.filter((item) => {
        const hay = [item.id, displayName(item), item.brand_id, item.preview, (item.flags || []).join(" ")].join(" ").toLowerCase();
        return (!query || hay.includes(query)) && (flag === "all" || (item.flags || []).includes(flag));
      });
    }

    function renderConversationList() {
      const list = $("conversationList");
      list.innerHTML = "";
      if (!state.filtered.length) {
        list.innerHTML = '<div class="empty">Aucune conversation.</div>';
        return;
      }
      state.filtered.forEach((item) => {
        const bClass = brandClass(item.brand_id);
        const name = displayName(item);
        const node = document.createElement("div");
        node.className = "item" + (item.id === state.activeId ? " active" : "");
        node.innerHTML = `
          <div class="avatar ${bClass}">${escapeHtml(initialsFor(name, "CL"))}</div>
          <div class="conv-main">
            <div class="conv-top">
              <div class="conv-name">${escapeHtml(name)}</div>
              <div class="conv-time">${escapeHtml((item.last || item.created || "").slice(11, 16))}</div>
            </div>
            <div class="conv-brand ${bClass}">${escapeHtml(brandLabel(item.brand_id))}</div>
            <div class="conv-preview">${escapeHtml(item.preview || "Pas encore de message")}</div>
          </div>
          <div class="conv-pill">${escapeHtml(item.count || 0)}</div>
        `;
        node.addEventListener("click", async () => {
          state.activeId = item.id;
          renderConversationList();
          await loadConversation(item.id);
        });
        list.appendChild(node);
      });
    }

    function updateActiveHeader() {
      if (!state.activeConversation) {
        $("activeName").textContent = "Aucune conversation";
        $("activeBrand").textContent = "Retroworld";
        $("activeBrand").className = "brand-badge";
        $("activeSubtitle").textContent = "Conversation via Chatbot";
        $("activeAvatar").textContent = "IA";
        $("activeAvatar").className = "avatar";
        return;
      }
      const meta = state.activeConversation.meta || {};
      const brand = meta.brand_id || "retroworld";
      const name = meta.user_id || ("Conversation " + String(state.activeConversation.id || "").slice(-6).toUpperCase());
      $("activeName").textContent = name;
      $("activeBrand").textContent = brandLabel(brand);
      $("activeBrand").className = "brand-badge " + brandClass(brand);
      $("activeSubtitle").textContent = "Conversation via Chatbot";
      $("activeAvatar").textContent = initialsFor(name, "CL");
      $("activeAvatar").className = "avatar " + brandClass(brand);
    }

    function renderThread() {
      const thread = $("thread");
      thread.innerHTML = "";
      updateActiveHeader();
      if (!state.activeConversation) {
        thread.innerHTML = '<div class="empty">Sélectionnez une conversation.</div>';
        return;
      }
      if ((state.activeConversation.meta || {}).brand_id && $("correctionBrand").value !== (state.activeConversation.meta || {}).brand_id) {
        $("correctionBrand").value = (state.activeConversation.meta || {}).brand_id;
      }
      (state.activeConversation.messages || []).forEach((message) => {
        const outgoing = message.role === "assistant";
        const row = document.createElement("div");
        row.className = "message-row " + (outgoing ? "outgoing" : "incoming");
        row.innerHTML = `
          <div class="avatar ${outgoing ? "assistant" : brandClass((state.activeConversation.meta || {}).brand_id)}">${outgoing ? "IA" : escapeHtml(initialsFor($("activeName").textContent, "CL"))}</div>
          <div class="bubble ${outgoing ? "assistant" : "user"}">
            <div>${escapeHtml(message.content)}</div>
            <div class="bubble-foot"><span>${escapeHtml((message.ts || "").slice(11, 16))}</span>${outgoing ? '<span class="seen">✓✓</span>' : ''}</div>
          </div>
        `;
        thread.appendChild(row);
      });
      thread.scrollTop = thread.scrollHeight;
    }

    function setCorrectionStatus(message) {
      $("correctionStatus").textContent = message;
    }

    function lastMessage(role) {
      const messages = (state.activeConversation && state.activeConversation.messages) || [];
      for (let idx = messages.length - 1; idx >= 0; idx -= 1) {
        if (messages[idx].role === role) return messages[idx];
      }
      return null;
    }

    function renderCorrections() {
      $("correctionBadge").textContent = String(state.corrections.length);
      const items = state.corrections || [];
      $("correctionList").innerHTML = items.length ? items.slice(0, 6).map((item) => `
        <div class="lead">
          <div class="row">
            <strong>${escapeHtml(brandLabel(item.brand_id))} #${escapeHtml(item.id)}</strong>
            <span class="${item.is_active ? 'hot' : 'cold'}">${item.is_active ? 'active' : 'inactive'}</span>
          </div>
          <div class="mini" style="margin-top:6px">${escapeHtml(item.trigger_text)}</div>
          <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">
            <button class="secondary" data-toggle-correction="${item.id}" data-next="${item.is_active ? 0 : 1}">${item.is_active ? 'Désactiver' : 'Activer'}</button>
          </div>
        </div>
      `).join("") : '<div class="mini-card mini">Aucune correction mémorisée pour cette marque.</div>';
      document.querySelectorAll("[data-toggle-correction]").forEach((button) => button.addEventListener("click", async () => {
        await api("/admin/api/corrections/" + button.dataset.toggleCorrection, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ is_active: Number(button.dataset.next) })
        });
        await loadCorrections();
      }));
    }

    async function loadSession() {
      const sessionData = await api("/admin/api/session");
      if (!sessionData.authenticated) { location.href = "/admin/login"; return; }
      state.username = sessionData.username;
      state.csrfToken = sessionData.csrf_token;
    }

    async function loadConversations() {
      const data = await api("/admin/api/conversations");
      state.conversations = data.items || [];
      applyFilters();
      renderConversationList();
      if (!state.activeId && state.filtered.length) {
        state.activeId = state.filtered[0].id;
        await loadConversation(state.activeId);
      }
    }

    async function loadConversation(id) {
      const data = await api("/admin/api/conversation/" + encodeURIComponent(id));
      state.activeConversation = data.conversation;
      renderThread();
      await loadCorrections();
      renderConversationList();
    }

    async function loadCorrectionBrands() {
      const data = await api("/admin/api/brands");
      state.brands = data.brands || [];
      $("correctionBrand").innerHTML = state.brands.map((brand) => `<option value="${escapeHtml(brand.id)}">${escapeHtml(brand.display_name || brand.name || brand.id)}</option>`).join("");
      if (!$("correctionBrand").value && state.brands.length) $("correctionBrand").value = state.brands[0].id;
    }

    async function loadCorrections() {
      const brand = $("correctionBrand").value || "retroworld";
      const data = await api("/admin/api/corrections?brand_id=" + encodeURIComponent(brand));
      state.corrections = data.items || [];
      renderCorrections();
    }

    async function loadAnalytics() {
      const [analyticsData, diagData, usersData] = await Promise.all([api("/admin/api/analytics"), api("/admin/api/diag"), api("/admin/api/users")]);
      const a = analyticsData.analytics || {};
      $("kpis").innerHTML = `
        <div class="kpi"><div class="label">Conversations</div><div class="value">${a.conversations_total || 0}</div></div>
        <div class="kpi"><div class="label">Leads</div><div class="value">${a.leads_total || 0}</div></div>
        <div class="kpi"><div class="label">Leads chauds</div><div class="value">${a.hot_leads || 0}</div></div>
        <div class="kpi"><div class="label">Utilisateurs admin</div><div class="value">${diagData.users_count || 0}</div></div>
      `;
      $("brandsStats").textContent = JSON.stringify(a.brands || {}, null, 2);
      $("flagsStats").textContent = JSON.stringify(a.flags || {}, null, 2);
      $("recentLogs").textContent = JSON.stringify((diagData.recent_logs || []).slice(-12), null, 2);
      const leads = a.recent_leads || [];
      $("leadList").innerHTML = leads.length ? leads.map((lead) => {
        const temp = ((lead.payload || {}).temperature || "cold");
        return `<div class="lead"><div class="row"><strong>${escapeHtml(lead.lead_type)}</strong><span class="${temp}">${escapeHtml(temp)}</span></div><div class="mini">${escapeHtml(lead.conversation_id)} | score ${escapeHtml(lead.score)}</div></div>`;
      }).join("") : '<div class="mini">Aucun lead qualifié pour le moment.</div>';
      const users = usersData.items || [];
      $("userList").innerHTML = users.length ? users.map((user) => `<div class="lead"><div class="row"><strong>${escapeHtml(user.username)}</strong><span class="${user.is_active ? 'hot' : 'cold'}">${user.is_active ? 'actif' : 'inactif'}</span></div><div class="mini">id ${escapeHtml(user.id)} | maj ${escapeHtml(user.updated_at)}</div><div style="margin-top:8px;display:flex;gap:8px"><button class="secondary" data-toggle-user="${user.id}" data-next="${user.is_active ? 0 : 1}">${user.is_active ? 'Désactiver' : 'Activer'}</button></div></div>`).join("") : '<div class="mini">Aucun utilisateur.</div>';
      document.querySelectorAll('[data-toggle-user]').forEach((button) => button.addEventListener('click', async () => {
        await api('/admin/api/users/' + button.dataset.toggleUser, { method:'PUT', headers:{ 'Content-Type':'application/json' }, body: JSON.stringify({ is_active: Number(button.dataset.next) }) });
        await loadAnalytics();
      }));
    }

    $("searchInput").addEventListener("input", () => { applyFilters(); renderConversationList(); });
    $("flagFilter").addEventListener("change", () => { applyFilters(); renderConversationList(); });
    $("btnRefresh").addEventListener("click", async () => { await loadConversations(); await loadAnalytics(); if (state.activeId) await loadConversation(state.activeId); });
    $("btnExport").addEventListener("click", () => window.open("/admin/api/export.csv", "_blank"));
    $("btnLogout").addEventListener("click", async () => { await api("/admin/api/auth/logout", { method: "POST" }); location.href = "/admin/login"; });
    $("correctionBrand").addEventListener("change", () => loadCorrections().catch((error) => setCorrectionStatus("Erreur: " + error.message)));
    $("btnUseLastUser").addEventListener("click", () => {
      const message = lastMessage("user");
      if (message) $("correctionTrigger").value = message.content || "";
    });
    $("btnUseLastAssistant").addEventListener("click", () => {
      const message = lastMessage("assistant");
      if (message) $("correctionAnswer").value = message.content || "";
    });
    $("btnSaveCorrection").addEventListener("click", async () => {
      const payload = {
        brand_id: $("correctionBrand").value || "retroworld",
        trigger_text: $("correctionTrigger").value.trim(),
        corrected_answer: $("correctionAnswer").value.trim(),
        notes: $("correctionNotes").value.trim(),
        priority: Number($("correctionPriority").value || 60),
        source_conversation_id: state.activeId || ""
      };
      if (!payload.trigger_text || !payload.corrected_answer) {
        setCorrectionStatus("Ajoutez un déclencheur et une réponse corrigée.");
        return;
      }
      setCorrectionStatus("Enregistrement...");
      await api("/admin/api/corrections", { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify(payload) });
      $("correctionAnswer").value = "";
      $("correctionNotes").value = "";
      setCorrectionStatus("Correction mémorisée.");
      await loadCorrections();
    });
    $("btnCreateUser").addEventListener("click", async () => {
      const username = $("newUserName").value.trim();
      const password = $("newUserPassword").value;
      if (!username || !password) return;
      await api('/admin/api/users', { method:'POST', headers:{ 'Content-Type':'application/json' }, body: JSON.stringify({ username, password }) });
      $("newUserName").value = '';
      $("newUserPassword").value = '';
      await loadAnalytics();
    });

    (async function init() {
      try {
        await loadSession();
        await loadCorrectionBrands();
        await Promise.all([loadConversations(), loadAnalytics(), loadCorrections()]);
      } catch (error) {
        $("thread").innerHTML = '<div class="empty">Erreur: ' + escapeHtml(error.message) + '</div>';
      }
    })();
  </script>
</body>
</html>
