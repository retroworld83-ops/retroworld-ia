<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Retroworld IA</title>
  <style>
    :root{--bg:#08111f;--panel:#111b2d;--panel2:#0c1524;--line:#23314a;--text:#eff4ff;--muted:#94a5c2;--accent:#38bdf8;--accent2:#22c55e;--warn:#f59e0b;--bad:#ef4444;--radius:16px}
    *{box-sizing:border-box} body{margin:0;font-family:Segoe UI,system-ui,sans-serif;background:radial-gradient(circle at top left,rgba(56,189,248,.12),transparent 26%),radial-gradient(circle at top right,rgba(34,197,94,.1),transparent 22%),var(--bg);color:var(--text)}
    .top{position:sticky;top:0;z-index:9;background:rgba(8,17,31,.92);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.06)}
    .top-inner,.wrap{max-width:1320px;margin:0 auto;padding:16px}
    .top-inner{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}
    .brand{font-weight:900}.muted{color:var(--muted);font-size:13px}
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    button,a.btn,select,input{font:inherit}
    button,a.btn{border:0;border-radius:12px;padding:10px 14px;font-weight:800;cursor:pointer;text-decoration:none}
    .primary{background:linear-gradient(135deg,var(--accent),#6366f1);color:#08111f}
    .secondary{background:var(--panel);color:var(--text);border:1px solid rgba(255,255,255,.08)}
    .wrap{display:grid;grid-template-columns:340px 1fr;gap:14px}
    @media (max-width:1080px){.wrap{grid-template-columns:1fr}}
    .stack{display:grid;gap:14px}
    .card{background:rgba(17,27,45,.94);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);overflow:hidden}
    .card-h{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}
    .title{font-size:13px;text-transform:uppercase;color:var(--muted);font-weight:900}
    .search{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;gap:10px;flex-wrap:wrap}
    .search input,.search select{background:var(--panel2);color:var(--text);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:11px 12px}
    .search input{flex:1;min-width:180px}
    .list{max-height:calc(100vh - 240px);overflow:auto}
    .item{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer}
    .item:hover,.item.active{background:rgba(56,189,248,.08)}
    .row{display:flex;justify-content:space-between;gap:10px;align-items:center}
    .badge{display:inline-flex;gap:6px;align-items:center;padding:4px 8px;border-radius:999px;border:1px solid rgba(255,255,255,.12);font-size:11px;color:var(--muted)}
    .thread{padding:16px;display:flex;flex-direction:column;gap:12px;max-height:460px;overflow:auto}
    .msg{max-width:88%;padding:12px 14px;border-radius:14px;line-height:1.45;white-space:pre-wrap;border:1px solid rgba(255,255,255,.08);background:rgba(6,11,20,.45)}
    .msg.user{margin-left:auto;background:rgba(56,189,248,.12)}
    .msg-foot{display:flex;justify-content:space-between;gap:10px;margin-top:8px;font-size:11px;color:var(--muted)}
    .empty{padding:22px;color:var(--muted)}
    .pane-toolbar{padding:14px 16px;border-top:1px solid rgba(255,255,255,.06);display:flex;gap:10px;flex-wrap:wrap}
    .kpis{padding:16px;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
    @media (max-width:1080px){.kpis{grid-template-columns:repeat(2,minmax(0,1fr))}}
    .kpi{padding:14px;border-radius:14px;background:rgba(6,11,20,.45);border:1px solid rgba(255,255,255,.06)}
    .kpi .label{font-size:12px;color:var(--muted)} .kpi .value{font-size:28px;font-weight:900;margin-top:6px}
    .split{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:0 16px 16px}
    @media (max-width:1080px){.split{grid-template-columns:1fr}}
    .subcard{background:rgba(6,11,20,.45);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:14px}
    .mini{font-size:12px;color:var(--muted)}
    .lead-list{display:grid;gap:10px}
    .lead{padding:10px 12px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)}
    .hot{color:#86efac}.warm{color:#fde68a}.cold{color:#93c5fd}
    pre{margin:0;white-space:pre-wrap;font-family:Consolas,monospace;font-size:11px;color:#cdd9f0}
  </style>
</head>
<body>
  <div class="top">
    <div class="top-inner">
      <div>
        <div class="brand">Admin Retroworld IA</div>
        <div class="muted" id="sessionMeta">Chargement de session...</div>
      </div>
      <div class="actions">
        <a class="btn secondary" href="/admin/faq">FAQ</a>
        <a class="btn secondary" href="/admin/knowledge">Base metier</a>
        <button class="secondary" id="btnExport">Export CSV</button>
        <button class="secondary" id="btnLogout">Deconnexion</button>
        <button class="primary" id="btnRefresh">Rafraichir</button>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div class="card">
      <div class="card-h"><div class="title">Conversations</div><div class="badge" id="countBadge">0</div></div>
      <div class="search">
        <input id="searchInput" placeholder="Recherche par id, marque, flags, preview..." />
        <select id="flagFilter">
          <option value="all">Tous les flags</option>
          <option value="a_valider">A valider</option>
          <option value="devis">Devis</option>
          <option value="reservation">Reservation</option>
          <option value="reclamation">Reclamation</option>
          <option value="croise">Croise</option>
          <option value="promesse_resa">Promesse resa</option>
        </select>
      </div>
      <div class="list" id="conversationList"></div>
    </div>

    <div class="stack">
      <div class="card">
        <div class="card-h">
          <div class="title">Dashboard</div>
          <div class="badge" id="diagBadge">Analytics</div>
        </div>
        <div class="kpis" id="kpis"></div>
        <div class="split">
          <div class="subcard">
            <div class="title">Par marque</div>
            <pre id="brandsStats">-</pre>
          </div>
          <div class="subcard">
            <div class="title">Par flag</div>
            <pre id="flagsStats">-</pre>
          </div>
          <div class="subcard">
            <div class="title">Leads recents</div>
            <div class="lead-list" id="leadList"></div>
          </div>
          <div class="subcard">
            <div class="title">Logs recents</div>
            <pre id="recentLogs">-</pre>
          </div>
          <div class="subcard">
            <div class="title">Utilisateurs admin</div>
            <div class="lead-list" id="userList"></div>
            <div style="display:grid;gap:8px;margin-top:12px">
              <input id="newUserName" placeholder="Nouvel utilisateur" style="background:var(--panel2);color:var(--text);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px 12px" />
              <input id="newUserPassword" type="password" placeholder="Mot de passe" style="background:var(--panel2);color:var(--text);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px 12px" />
              <button class="primary" id="btnCreateUser">Creer l'utilisateur</button>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-h">
          <div class="title">Conversation</div>
          <div class="badge" id="activeMeta">Aucune selection</div>
        </div>
        <div class="thread" id="thread"></div>
        <div class="empty" id="emptyState">Selectionnez une conversation a gauche.</div>
        <div class="pane-toolbar">
          <button class="secondary" id="btnCopyId">Copier id</button>
          <button class="secondary" id="btnCopyJson">Copier JSON</button>
          <button class="primary" id="btnReloadOne">Recharger la conversation</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const state = { csrfToken: "", username: "", conversations: [], filtered: [], activeId: "", activeConversation: null };

    async function api(path, options = {}) {
      const headers = Object.assign({}, options.headers || {});
      if (state.csrfToken && ["POST", "PUT", "DELETE"].includes((options.method || "GET").toUpperCase())) headers["X-CSRF-Token"] = state.csrfToken;
      const response = await fetch(path, Object.assign({ credentials: "same-origin" }, options, { headers }));
      const data = await response.json().catch(() => null);
      if (!response.ok) throw new Error((data && (data.error || data.message)) || ("HTTP " + response.status));
      return data;
    }

    function escapeHtml(value) {
      return String(value || "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");
    }

    function applyFilters() {
      const query = ($("searchInput").value || "").trim().toLowerCase();
      const flag = $("flagFilter").value;
      state.filtered = state.conversations.filter((item) => {
        const hay = [item.id, item.brand_id, item.preview, (item.flags || []).join(" ")].join(" ").toLowerCase();
        return (!query || hay.includes(query)) && (flag === "all" || (item.flags || []).includes(flag));
      });
    }

    function renderConversationList() {
      const list = $("conversationList");
      list.innerHTML = "";
      $("countBadge").textContent = String(state.filtered.length);
      if (!state.filtered.length) {
        list.innerHTML = '<div class="empty">Aucune conversation.</div>';
        return;
      }
      state.filtered.forEach((item) => {
        const node = document.createElement("div");
        node.className = "item" + (item.id === state.activeId ? " active" : "");
        node.innerHTML = `
          <div class="row">
            <div><div>${escapeHtml(item.id)}</div><div class="mini">${escapeHtml(item.brand_id || "-")}</div></div>
            <div class="badge">${escapeHtml((item.flags || []).join(", ") || "aucun flag")}</div>
          </div>
          <div class="mini" style="margin-top:8px">${escapeHtml(item.preview || "Pas encore de message")}</div>
          <div class="mini" style="margin-top:8px">${escapeHtml(item.last || item.created || "")}</div>
        `;
        node.addEventListener("click", async () => {
          state.activeId = item.id;
          renderConversationList();
          await loadConversation(item.id);
        });
        list.appendChild(node);
      });
    }

    function renderThread() {
      const thread = $("thread");
      const empty = $("emptyState");
      thread.innerHTML = "";
      if (!state.activeConversation) {
        empty.style.display = "block";
        return;
      }
      empty.style.display = "none";
      $("activeMeta").textContent = `${state.activeConversation.id} | ${(state.activeConversation.meta || {}).brand_id || "-"} | ${(state.activeConversation.flags || []).join(", ") || "aucun flag"}`;
      (state.activeConversation.messages || []).forEach((message) => {
        const node = document.createElement("div");
        node.className = "msg " + (message.role === "user" ? "user" : "assistant");
        node.innerHTML = `<div>${escapeHtml(message.content)}</div><div class="msg-foot"><span>${escapeHtml(message.role)}</span><span>${escapeHtml(message.ts)}</span></div>`;
        thread.appendChild(node);
      });
    }

    async function loadSession() {
      const sessionData = await api("/admin/api/session");
      if (!sessionData.authenticated) { location.href = "/admin/login"; return; }
      state.username = sessionData.username;
      state.csrfToken = sessionData.csrf_token;
      $("sessionMeta").textContent = `Connecte en tant que ${sessionData.username}`;
    }

    async function loadConversations() {
      const data = await api("/admin/api/conversations");
      state.conversations = data.items || [];
      applyFilters();
      renderConversationList();
    }

    async function loadConversation(id) {
      const data = await api("/admin/api/conversation/" + encodeURIComponent(id));
      state.activeConversation = data.conversation;
      renderThread();
    }

    async function loadAnalytics() {
      const [analyticsData, diagData, usersData] = await Promise.all([api("/admin/api/analytics"), api("/admin/api/diag"), api("/admin/api/users")]);
      const a = analyticsData.analytics || {};
      $("kpis").innerHTML = `
        <div class="kpi"><div class="label">Conversations</div><div class="value">${a.conversations_total || 0}</div></div>
        <div class="kpi"><div class="label">Leads</div><div class="value">${a.leads_total || 0}</div></div>
        <div class="kpi"><div class="label">Leads chauds</div><div class="value">${a.hot_leads || 0}</div></div>
        <div class="kpi"><div class="label">Utilisateurs admin</div><div class="value">${diagData.users_count || 0}</div></div>
      `;
      $("brandsStats").textContent = JSON.stringify(a.brands || {}, null, 2);
      $("flagsStats").textContent = JSON.stringify(a.flags || {}, null, 2);
      $("recentLogs").textContent = JSON.stringify((diagData.recent_logs || []).slice(-12), null, 2);
      const leads = a.recent_leads || [];
      $("leadList").innerHTML = leads.length ? leads.map((lead) => {
        const temp = ((lead.payload || {}).temperature || "cold");
        return `<div class="lead"><div class="row"><strong>${escapeHtml(lead.lead_type)}</strong><span class="${temp}">${escapeHtml(temp)}</span></div><div class="mini">${escapeHtml(lead.conversation_id)} | score ${escapeHtml(lead.score)}</div></div>`;
      }).join("") : '<div class="mini">Aucun lead qualifie pour le moment.</div>';
      const users = usersData.items || [];
      $("userList").innerHTML = users.length ? users.map((user) => `<div class="lead"><div class="row"><strong>${escapeHtml(user.username)}</strong><span class="${user.is_active ? 'hot' : 'cold'}">${user.is_active ? 'actif' : 'inactif'}</span></div><div class="mini">id ${escapeHtml(user.id)} | maj ${escapeHtml(user.updated_at)}</div><div style="margin-top:8px;display:flex;gap:8px"><button class="secondary" data-toggle-user="${user.id}" data-next="${user.is_active ? 0 : 1}">${user.is_active ? 'Desactiver' : 'Activer'}</button></div></div>`).join("") : '<div class="mini">Aucun utilisateur.</div>';
      document.querySelectorAll('[data-toggle-user]').forEach((button) => button.addEventListener('click', async () => {
        await api('/admin/api/users/' + button.dataset.toggleUser, { method:'PUT', headers:{ 'Content-Type':'application/json' }, body: JSON.stringify({ is_active: Number(button.dataset.next) }) });
        await loadAnalytics();
      }));
    }

    $("searchInput").addEventListener("input", () => { applyFilters(); renderConversationList(); });
    $("flagFilter").addEventListener("change", () => { applyFilters(); renderConversationList(); });
    $("btnRefresh").addEventListener("click", async () => { await loadConversations(); await loadAnalytics(); if (state.activeId) await loadConversation(state.activeId); });
    $("btnReloadOne").addEventListener("click", async () => { if (state.activeId) await loadConversation(state.activeId); });
    $("btnExport").addEventListener("click", () => window.open("/admin/api/export.csv", "_blank"));
    $("btnLogout").addEventListener("click", async () => { await api("/admin/api/auth/logout", { method: "POST" }); location.href = "/admin/login"; });
    $("btnCopyId").addEventListener("click", async () => { if (state.activeId) await navigator.clipboard.writeText(state.activeId); });
    $("btnCopyJson").addEventListener("click", async () => { if (state.activeConversation) await navigator.clipboard.writeText(JSON.stringify(state.activeConversation, null, 2)); });
    $("btnCreateUser").addEventListener("click", async () => {
      const username = $("newUserName").value.trim();
      const password = $("newUserPassword").value;
      if (!username || !password) return;
      await api('/admin/api/users', { method:'POST', headers:{ 'Content-Type':'application/json' }, body: JSON.stringify({ username, password }) });
      $("newUserName").value = '';
      $("newUserPassword").value = '';
      await loadAnalytics();
    });

    (async function init() {
      try {
        await loadSession();
        await Promise.all([loadConversations(), loadAnalytics()]);
      } catch (error) {
        $("sessionMeta").textContent = "Erreur: " + error.message;
      }
    })();
  </script>
</body>
</html>
