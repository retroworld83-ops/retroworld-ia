<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Retroworld IA</title>
  <style>
    :root{--bg:#0b1018;--panel:#171e2a;--panel2:#111823;--line:#323d4f;--text:#f7fbff;--muted:#b4c0d3;--accent:#45c4ff;--accent2:#38d978;--warn:#f6b64d;--bad:#ff6b6b;--radius:12px}
    *{box-sizing:border-box} body{margin:0;font-family:Segoe UI,system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.45}
    .top{position:sticky;top:0;z-index:9;background:#0b1018;border-bottom:1px solid var(--line)}
    .top-inner,.wrap{max-width:1440px;margin:0 auto;padding:16px}
    .top-inner{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}
    .brand{font-weight:1000;font-size:18px}.muted{color:var(--muted);font-size:13px}
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    button,a.btn,select,input,textarea{font:inherit}
    button,a.btn{border:0;border-radius:10px;min-height:42px;padding:10px 14px;font-weight:850;cursor:pointer;text-decoration:none}
    .primary{background:var(--accent);color:#06111a}
    .secondary{background:#202939;color:var(--text);border:1px solid var(--line)}
    .wrap{display:grid;grid-template-columns:380px 1fr;gap:16px}
    @media (max-width:1080px){.wrap{grid-template-columns:1fr}}
    .stack{display:flex;flex-direction:column;gap:16px}
    .dashboard-card{order:3}.conversation-card{order:1}.correction-card{order:2}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
    .card-h{padding:15px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}
    .title{font-size:13px;text-transform:uppercase;color:#d7e2f4;font-weight:950;letter-spacing:.06em}
    .search{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;gap:10px;flex-wrap:wrap}
    .search input,.search select{background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:10px;padding:11px 12px}
    .search input{flex:1;min-width:180px}
    .list{max-height:calc(100vh - 230px);overflow:auto}
    .item{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.06);cursor:pointer}
    .item:hover,.item.active{background:#223044}
    .row{display:flex;justify-content:space-between;gap:10px;align-items:center}
    .badge{display:inline-flex;gap:6px;align-items:center;padding:5px 9px;border-radius:999px;border:1px solid var(--line);font-size:12px;color:var(--muted)}
    .thread{padding:16px;display:flex;flex-direction:column;gap:12px;min-height:320px;max-height:560px;overflow:auto;background:#101722}
    .msg{max-width:90%;padding:13px 15px;border-radius:12px;line-height:1.55;white-space:pre-wrap;border:1px solid var(--line);background:#1b2432;font-size:15px}
    .msg.user{margin-left:auto;background:#17354b;border-color:#35698e}
    .msg.assistant{background:#1b2432}
    .msg-foot{display:flex;justify-content:space-between;gap:10px;margin-top:8px;font-size:12px;color:var(--muted)}
    .empty{padding:22px;color:var(--muted)}
    .pane-toolbar{padding:14px 16px;border-top:1px solid var(--line);display:flex;gap:10px;flex-wrap:wrap}
    .correction-form{padding:16px;display:grid;gap:10px}
    .field{display:grid;gap:6px}
    .field span{font-size:13px;color:#d7e2f4;font-weight:850}
    .correction-form textarea,.correction-form input,.correction-form select{width:100%;background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:10px;padding:11px 12px}
    .correction-form textarea{min-height:112px;resize:vertical}
    .correction-grid{display:grid;grid-template-columns:1fr 140px;gap:10px}
    @media (max-width:720px){.correction-grid{grid-template-columns:1fr}}
    .kpis{padding:16px;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
    @media (max-width:1080px){.kpis{grid-template-columns:repeat(2,minmax(0,1fr))}}
    .kpi{padding:14px;border-radius:14px;background:rgba(6,11,20,.45);border:1px solid rgba(255,255,255,.06)}
    .kpi .label{font-size:12px;color:var(--muted)} .kpi .value{font-size:28px;font-weight:900;margin-top:6px}
    .split{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:0 16px 16px}
    @media (max-width:1080px){.split{grid-template-columns:1fr}}
    .subcard{background:rgba(6,11,20,.45);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:14px}
    .mini{font-size:12px;color:var(--muted)}
    .lead-list{display:grid;gap:10px}
    .lead{padding:10px 12px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)}
    .hot{color:#86efac}.warm{color:#fde68a}.cold{color:#93c5fd}
    pre{margin:0;white-space:pre-wrap;font-family:Consolas,monospace;font-size:11px;color:#cdd9f0}
  </style>
</head>
<body>
  <div class="top">
    <div class="top-inner">
      <div>
        <div class="brand">Admin Retroworld IA</div>
        <div class="muted" id="sessionMeta">Chargement de session...</div>
      </div>
      <div class="actions">
        <a class="btn secondary" href="/admin/faq">FAQ</a>
        <a class="btn secondary" href="/admin/knowledge">Base metier</a>
        <button class="secondary" id="btnExport">Export CSV</button>
        <button class="secondary" id="btnLogout">Déconnexion</button>
        <button class="primary" id="btnRefresh">Rafraîchir</button>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div class="card">
      <div class="card-h"><div class="title">Conversations</div><div class="badge" id="countBadge">0</div></div>
      <div class="search">
        <input id="searchInput" placeholder="Recherche par id, marque, flags, preview..." />
        <select id="flagFilter">
          <option value="all">Tous les flags</option>
          <option value="a_valider">À valider</option>
          <option value="devis">Devis</option>
          <option value="reservation">Réservation</option>
          <option value="reclamation">Réclamation</option>
          <option value="croise">Croisé</option>
          <option value="promesse_resa">Promesse résa</option>
        </select>
      </div>
      <div class="list" id="conversationList"></div>
    </div>

    <div class="stack">
      <div class="card dashboard-card">
        <div class="card-h">
          <div class="title">Dashboard</div>
          <div class="badge" id="diagBadge">Analytics</div>
        </div>
        <div class="kpis" id="kpis"></div>
        <div class="split">
          <div class="subcard">
            <div class="title">Par marque</div>
            <pre id="brandsStats">-</pre>
          </div>
          <div class="subcard">
            <div class="title">Par flag</div>
            <pre id="flagsStats">-</pre>
          </div>
          <div class="subcard">
            <div class="title">Leads récents</div>
            <div class="lead-list" id="leadList"></div>
          </div>
          <div class="subcard">
            <div class="title">Logs récents</div>
            <pre id="recentLogs">-</pre>
          </div>
          <div class="subcard">
            <div class="title">Utilisateurs admin</div>
            <div class="lead-list" id="userList"></div>
            <div style="display:grid;gap:8px;margin-top:12px">
              <input id="newUserName" placeholder="Nouvel utilisateur" style="background:var(--panel2);color:var(--text);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px 12px" />
              <input id="newUserPassword" type="password" placeholder="Mot de passe" style="background:var(--panel2);color:var(--text);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px 12px" />
              <button class="primary" id="btnCreateUser">Créer l'utilisateur</button>
            </div>
          </div>
        </div>
      </div>

      <div class="card conversation-card">
        <div class="card-h">
          <div class="title">Conversation</div>
          <div class="badge" id="activeMeta">Aucune selection</div>
        </div>
        <div class="thread" id="thread"></div>
        <div class="empty" id="emptyState">Sélectionnez une conversation à gauche.</div>
        <div class="pane-toolbar">
          <button class="secondary" id="btnCopyId">Copier id</button>
          <button class="secondary" id="btnCopyJson">Copier JSON</button>
          <button class="primary" id="btnReloadOne">Recharger la conversation</button>
        </div>
      </div>

      <div class="card correction-card">
        <div class="card-h">
          <div class="title">Mémoire de corrections IA</div>
          <div class="badge" id="correctionBadge">0</div>
        </div>
        <div class="correction-form">
          <div class="correction-grid">
            <label class="field"><span>Marque</span><select id="correctionBrand"></select></label>
            <label class="field"><span>Priorité</span><input id="correctionPriority" type="number" min="0" max="100" value="60" title="Priorité" /></label>
          </div>
          <label class="field"><span>Déclencheur</span><textarea id="correctionTrigger" placeholder="Question client ou sujet à reconnaître"></textarea></label>
          <label class="field"><span>Réponse corrigée</span><textarea id="correctionAnswer" placeholder="Réponse exacte que l'assistant devra suivre"></textarea></label>
          <label class="field"><span>Note interne</span><input id="correctionNotes" placeholder="Contexte optionnel" /></label>
          <div class="actions">
            <button class="secondary" id="btnUseLastUser">Reprendre la question</button>
            <button class="secondary" id="btnUseLastAssistant">Reprendre la réponse</button>
            <button class="primary" id="btnSaveCorrection">Enregistrer correction</button>
          </div>
          <div class="mini" id="correctionStatus">Prêt.</div>
          <div class="lead-list" id="correctionList"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const state = { csrfToken: "", username: "", conversations: [], filtered: [], activeId: "", activeConversation: null, brands: [], corrections: [] };

    async function api(path, options = {}) {
      const headers = Object.assign({}, options.headers || {});
      if (state.csrfToken && ["POST", "PUT", "DELETE"].includes((options.method || "GET").toUpperCase())) headers["X-CSRF-Token"] = state.csrfToken;
      const response = await fetch(path, Object.assign({ credentials: "same-origin" }, options, { headers }));
      const data = await response.json().catch(() => null);
      if (!response.ok) throw new Error((data && (data.error || data.message)) || ("HTTP " + response.status));
      return data;
    }

    function escapeHtml(value) {
      return String(value || "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");
    }

    function roleLabel(role) {
      if (role === "user") return "Client";
      if (role === "assistant") return "Assistant";
      return role || "-";
    }

    function applyFilters() {
      const query = ($("searchInput").value || "").trim().toLowerCase();
      const flag = $("flagFilter").value;
      state.filtered = state.conversations.filter((item) => {
        const hay = [item.id, item.brand_id, item.preview, (item.flags || []).join(" ")].join(" ").toLowerCase();
        return (!query || hay.includes(query)) && (flag === "all" || (item.flags || []).includes(flag));
      });
    }

    function renderConversationList() {
      const list = $("conversationList");
      list.innerHTML = "";
      $("countBadge").textContent = String(state.filtered.length);
      if (!state.filtered.length) {
        list.innerHTML = '<div class="empty">Aucune conversation.</div>';
        return;
      }
      state.filtered.forEach((item) => {
        const node = document.createElement("div");
        node.className = "item" + (item.id === state.activeId ? " active" : "");
        node.innerHTML = `
          <div class="row">
            <div><div>${escapeHtml(item.id)}</div><div class="mini">${escapeHtml(item.brand_id || "-")}</div></div>
            <div class="badge">${escapeHtml((item.flags || []).join(", ") || "aucun flag")}</div>
          </div>
          <div class="mini" style="margin-top:8px">${escapeHtml(item.preview || "Pas encore de message")}</div>
          <div class="mini" style="margin-top:8px">${escapeHtml(item.last || item.created || "")}</div>
        `;
        node.addEventListener("click", async () => {
          state.activeId = item.id;
          renderConversationList();
          await loadConversation(item.id);
        });
        list.appendChild(node);
      });
    }

    function renderThread() {
      const thread = $("thread");
      const empty = $("emptyState");
      thread.innerHTML = "";
      if (!state.activeConversation) {
        empty.style.display = "block";
        return;
      }
      empty.style.display = "none";
      $("activeMeta").textContent = `${state.activeConversation.id} | ${(state.activeConversation.meta || {}).brand_id || "-"} | ${(state.activeConversation.flags || []).join(", ") || "aucun flag"}`;
      if ((state.activeConversation.meta || {}).brand_id && $("correctionBrand").value !== (state.activeConversation.meta || {}).brand_id) {
        $("correctionBrand").value = (state.activeConversation.meta || {}).brand_id;
      }
      (state.activeConversation.messages || []).forEach((message) => {
        const node = document.createElement("div");
        node.className = "msg " + (message.role === "user" ? "user" : "assistant");
        node.innerHTML = `<div>${escapeHtml(message.content)}</div><div class="msg-foot"><span>${escapeHtml(roleLabel(message.role))}</span><span>${escapeHtml(message.ts)}</span></div>`;
        thread.appendChild(node);
      });
    }

    function setCorrectionStatus(message) {
      $("correctionStatus").textContent = message;
    }

    function lastMessage(role) {
      const messages = (state.activeConversation && state.activeConversation.messages) || [];
      for (let idx = messages.length - 1; idx >= 0; idx -= 1) {
        if (messages[idx].role === role) return messages[idx];
      }
      return null;
    }

    function renderCorrections() {
      $("correctionBadge").textContent = String(state.corrections.length);
      const items = state.corrections || [];
      $("correctionList").innerHTML = items.length ? items.slice(0, 20).map((item) => `
        <div class="lead">
          <div class="row">
            <strong>${escapeHtml(item.brand_id)} #${escapeHtml(item.id)}</strong>
            <span class="${item.is_active ? 'hot' : 'cold'}">${item.is_active ? 'active' : 'inactive'}</span>
          </div>
          <div class="mini" style="margin-top:6px"><strong>Déclencheur :</strong> ${escapeHtml(item.trigger_text)}</div>
          <div class="mini" style="margin-top:6px"><strong>Correction:</strong> ${escapeHtml(item.corrected_answer)}</div>
          <div class="mini" style="margin-top:6px">priorité ${escapeHtml(item.priority)} | ${escapeHtml(item.updated_at || item.created_at || '')}${item.openai_synced_at ? ' | sync OpenAI ' + escapeHtml(item.openai_synced_at) : ''}${item.sync_error ? ' | erreur sync' : ''}</div>
          <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">
            <button class="secondary" data-toggle-correction="${item.id}" data-next="${item.is_active ? 0 : 1}">${item.is_active ? 'Désactiver' : 'Activer'}</button>
          </div>
        </div>
      `).join("") : '<div class="mini">Aucune correction mémorisée pour cette marque.</div>';
      document.querySelectorAll("[data-toggle-correction]").forEach((button) => button.addEventListener("click", async () => {
        await api("/admin/api/corrections/" + button.dataset.toggleCorrection, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ is_active: Number(button.dataset.next) })
        });
        await loadCorrections();
      }));
    }

    async function loadSession() {
      const sessionData = await api("/admin/api/session");
      if (!sessionData.authenticated) { location.href = "/admin/login"; return; }
      state.username = sessionData.username;
      state.csrfToken = sessionData.csrf_token;
      $("sessionMeta").textContent = `Connecté en tant que ${sessionData.username}`;
    }

    async function loadConversations() {
      const data = await api("/admin/api/conversations");
      state.conversations = data.items || [];
      applyFilters();
      renderConversationList();
    }

    async function loadConversation(id) {
      const data = await api("/admin/api/conversation/" + encodeURIComponent(id));
      state.activeConversation = data.conversation;
      renderThread();
      await loadCorrections();
    }

    async function loadCorrectionBrands() {
      const data = await api("/admin/api/brands");
      state.brands = data.brands || [];
      $("correctionBrand").innerHTML = state.brands.map((brand) => `<option value="${escapeHtml(brand.id)}">${escapeHtml(brand.display_name || brand.name || brand.id)}</option>`).join("");
      if (!$("correctionBrand").value && state.brands.length) $("correctionBrand").value = state.brands[0].id;
    }

    async function loadCorrections() {
      const brand = $("correctionBrand").value || "retroworld";
      const data = await api("/admin/api/corrections?brand_id=" + encodeURIComponent(brand));
      state.corrections = data.items || [];
      renderCorrections();
    }

    async function loadAnalytics() {
      const [analyticsData, diagData, usersData] = await Promise.all([api("/admin/api/analytics"), api("/admin/api/diag"), api("/admin/api/users")]);
      const a = analyticsData.analytics || {};
      $("kpis").innerHTML = `
        <div class="kpi"><div class="label">Conversations</div><div class="value">${a.conversations_total || 0}</div></div>
        <div class="kpi"><div class="label">Leads</div><div class="value">${a.leads_total || 0}</div></div>
        <div class="kpi"><div class="label">Leads chauds</div><div class="value">${a.hot_leads || 0}</div></div>
        <div class="kpi"><div class="label">Utilisateurs admin</div><div class="value">${diagData.users_count || 0}</div></div>
      `;
      $("brandsStats").textContent = JSON.stringify(a.brands || {}, null, 2);
      $("flagsStats").textContent = JSON.stringify(a.flags || {}, null, 2);
      $("recentLogs").textContent = JSON.stringify((diagData.recent_logs || []).slice(-12), null, 2);
      const leads = a.recent_leads || [];
      $("leadList").innerHTML = leads.length ? leads.map((lead) => {
        const temp = ((lead.payload || {}).temperature || "cold");
        return `<div class="lead"><div class="row"><strong>${escapeHtml(lead.lead_type)}</strong><span class="${temp}">${escapeHtml(temp)}</span></div><div class="mini">${escapeHtml(lead.conversation_id)} | score ${escapeHtml(lead.score)}</div></div>`;
      }).join("") : '<div class="mini">Aucun lead qualifié pour le moment.</div>';
      const users = usersData.items || [];
      $("userList").innerHTML = users.length ? users.map((user) => `<div class="lead"><div class="row"><strong>${escapeHtml(user.username)}</strong><span class="${user.is_active ? 'hot' : 'cold'}">${user.is_active ? 'actif' : 'inactif'}</span></div><div class="mini">id ${escapeHtml(user.id)} | maj ${escapeHtml(user.updated_at)}</div><div style="margin-top:8px;display:flex;gap:8px"><button class="secondary" data-toggle-user="${user.id}" data-next="${user.is_active ? 0 : 1}">${user.is_active ? 'Désactiver' : 'Activer'}</button></div></div>`).join("") : '<div class="mini">Aucun utilisateur.</div>';
      document.querySelectorAll('[data-toggle-user]').forEach((button) => button.addEventListener('click', async () => {
        await api('/admin/api/users/' + button.dataset.toggleUser, { method:'PUT', headers:{ 'Content-Type':'application/json' }, body: JSON.stringify({ is_active: Number(button.dataset.next) }) });
        await loadAnalytics();
      }));
    }

    $("searchInput").addEventListener("input", () => { applyFilters(); renderConversationList(); });
    $("flagFilter").addEventListener("change", () => { applyFilters(); renderConversationList(); });
    $("btnRefresh").addEventListener("click", async () => { await loadConversations(); await loadAnalytics(); if (state.activeId) await loadConversation(state.activeId); });
    $("btnReloadOne").addEventListener("click", async () => { if (state.activeId) await loadConversation(state.activeId); });
    $("btnExport").addEventListener("click", () => window.open("/admin/api/export.csv", "_blank"));
    $("btnLogout").addEventListener("click", async () => { await api("/admin/api/auth/logout", { method: "POST" }); location.href = "/admin/login"; });
    $("btnCopyId").addEventListener("click", async () => { if (state.activeId) await navigator.clipboard.writeText(state.activeId); });
    $("btnCopyJson").addEventListener("click", async () => { if (state.activeConversation) await navigator.clipboard.writeText(JSON.stringify(state.activeConversation, null, 2)); });
    $("correctionBrand").addEventListener("change", () => loadCorrections().catch((error) => setCorrectionStatus("Erreur: " + error.message)));
    $("btnUseLastUser").addEventListener("click", () => {
      const message = lastMessage("user");
      if (message) $("correctionTrigger").value = message.content || "";
    });
    $("btnUseLastAssistant").addEventListener("click", () => {
      const message = lastMessage("assistant");
      if (message) $("correctionAnswer").value = message.content || "";
    });
    $("btnSaveCorrection").addEventListener("click", async () => {
      const payload = {
        brand_id: $("correctionBrand").value || "retroworld",
        trigger_text: $("correctionTrigger").value.trim(),
        corrected_answer: $("correctionAnswer").value.trim(),
        notes: $("correctionNotes").value.trim(),
        priority: Number($("correctionPriority").value || 60),
        source_conversation_id: state.activeId || ""
      };
      if (!payload.trigger_text || !payload.corrected_answer) {
        setCorrectionStatus("Ajoutez un déclencheur et une réponse corrigée.");
        return;
      }
      setCorrectionStatus("Enregistrement...");
      await api("/admin/api/corrections", { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify(payload) });
      $("correctionAnswer").value = "";
      $("correctionNotes").value = "";
      setCorrectionStatus("Correction mémorisée.");
      await loadCorrections();
    });
    $("btnCreateUser").addEventListener("click", async () => {
      const username = $("newUserName").value.trim();
      const password = $("newUserPassword").value;
      if (!username || !password) return;
      await api('/admin/api/users', { method:'POST', headers:{ 'Content-Type':'application/json' }, body: JSON.stringify({ username, password }) });
      $("newUserName").value = '';
      $("newUserPassword").value = '';
      await loadAnalytics();
    });

    (async function init() {
      try {
        await loadSession();
        await loadCorrectionBrands();
        await Promise.all([loadConversations(), loadAnalytics(), loadCorrections()]);
      } catch (error) {
        $("sessionMeta").textContent = "Erreur: " + error.message;
      }
    })();
  </script>
</body>
</html>
