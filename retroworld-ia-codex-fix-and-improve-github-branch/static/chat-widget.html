<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Widget IA Pôle Loisirs</title>
  <style>
    :root{
      --rw-bg:#020617;
      --rw-panel:#0b1220;
      --rw-border:rgba(148,163,184,.22);
      --rw-text:#e5e7eb;
      --rw-muted:#94a3b8;
      --rw-primary:#6366f1;
      --rw-accent:#06b6d4;
      --rw-shadow:0 22px 55px rgba(0,0,0,.75);
    }

    html,body{margin:0;padding:0;background:transparent;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--rw-text)}

    #rw-bt-launcher{
      position:fixed; right:22px; bottom:22px; z-index:99999;
      display:flex; align-items:center; gap:10px;
      padding:12px 18px; border-radius:999px;
      background:rgba(2,6,23,.96);
      border:2px solid var(--rw-primary);
      box-shadow:0 0 22px rgba(99,102,241,.85);
      color:var(--rw-text); cursor:pointer; user-select:none;
      font-weight:900; font-size:16px; letter-spacing:.02em;
      animation:rwPulse 2.3s infinite;
    }
    .rw-bt-icon{ font-size:18px; }
    .rw-bt-label{ white-space:nowrap; }
    @keyframes rwPulse{
      0%{ box-shadow:0 0 12px rgba(99,102,241,.35); transform:translateY(0);}
      50%{ box-shadow:0 0 28px rgba(99,102,241,1); transform:translateY(-1px);}
      100%{ box-shadow:0 0 12px rgba(99,102,241,.35); transform:translateY(0);}
    }

    #rw-bt-panel{
      position:fixed; right:22px; bottom:90px; z-index:99999;
      width:520px; max-width:calc(100vw - 40px); max-height:78vh;
      background:var(--rw-bg);
      border:1px solid var(--rw-border);
      border-radius:20px; box-shadow:var(--rw-shadow);
      overflow:hidden; display:flex; flex-direction:column;
      opacity:0; transform:translateY(14px) scale(.98);
      pointer-events:none; transition:opacity .22s ease, transform .22s ease;
    }
    #rw-bt-panel.rw-open{ opacity:1; transform:translateY(0) scale(1); pointer-events:auto; }

    .rw-bt-header{
      padding:12px 14px;
      background:radial-gradient(circle at top left, var(--rw-primary), var(--rw-accent));
      color:#0b1120; display:flex; align-items:center; justify-content:space-between;
    }
    .rw-bt-title{ font-weight:1000; font-size:17px; }
    .rw-bt-close{ border:none; background:transparent; cursor:pointer; font-size:22px; font-weight:900; color:#0b1120; }

    .rw-bt-tabs{
      display:flex; gap:8px; padding:10px;
      background:#020617; border-bottom:1px solid var(--rw-border);
    }
    .rw-bt-tab{
      flex:1;
      border:1px solid var(--rw-border);
      background:rgba(2,6,23,.55);
      color:var(--rw-text);
      padding:10px 12px; border-radius:999px;
      font-weight:900; cursor:pointer;
    }
    .rw-bt-tab-active{
      background:linear-gradient(135deg, rgba(99,102,241,.95), rgba(6,182,212,.75));
      color:#06101d; border-color:rgba(255,255,255,.2);
    }

    .rw-bt-body{ display:none; padding:12px; overflow:auto; background:radial-gradient(circle at top, #111827 0, #020617 70%); }
    .rw-bt-body-active{ display:block; }

    .rw-faq-searchWrap{
      position:relative;
      display:flex; align-items:center; gap:10px;
      padding:10px 12px;
      border-radius:16px;
      background:rgba(2,6,23,.72);
      border:1px solid rgba(148,163,184,.22);
      box-shadow:0 0 18px rgba(99,102,241,.12);
    }
    .rw-faq-searchIcon{ opacity:.9; font-size:16px; }
    #rw-faq-search{ flex:1; border:none; outline:none; background:transparent; color:var(--rw-text); font-size:15px; padding:6px 0; }
    #rw-faq-search::placeholder{ color:rgba(148,163,184,.75); }
    .rw-faq-clear{ border:none; cursor:pointer; width:34px; height:34px; border-radius:12px; background:rgba(148,163,184,.10); color:var(--rw-text); font-weight:900; }
    .rw-faq-meta{ margin:10px 2px 8px; color:rgba(148,163,184,.85); font-size:12px; }
    .rw-faq-list{ display:flex; flex-direction:column; gap:8px; margin-bottom:12px; }
    .rw-faq-item{ border:1px solid rgba(148,163,184,.18); background:rgba(15,23,42,.70); border-radius:16px; padding:12px; cursor:pointer; transition:transform .12s ease, border-color .12s ease, box-shadow .12s ease; }
    .rw-faq-item:hover{ transform:translateY(-1px); border-color:rgba(99,102,241,.55); box-shadow:0 0 18px rgba(99,102,241,.18); }
    .rw-faq-q{ font-weight:950; color:var(--rw-text); font-size:14px; line-height:1.35; }
    .rw-faq-tags{ margin-top:6px; display:flex; flex-wrap:wrap; gap:6px; }
    .rw-faq-tag{ font-size:11px; padding:4px 8px; border-radius:999px; border:1px solid rgba(148,163,184,.18); background:rgba(2,6,23,.45); color:rgba(148,163,184,.9); }
    .rw-faq-empty{ margin:10px 2px 12px; color:rgba(148,163,184,.85); font-size:13px; padding:12px; border-radius:16px; border:1px dashed rgba(148,163,184,.25); background:rgba(2,6,23,.35); }
    .rw-faq-answer{ border:1px solid rgba(148,163,184,.18); background:rgba(2,6,23,.55); border-radius:16px; padding:12px; color:var(--rw-text); line-height:1.55; white-space:pre-wrap; min-height:92px; }

    .rw-bt-messages{
      display:flex; flex-direction:column; gap:10px;
      min-height:260px; max-height:44vh;
      overflow:auto; padding:8px;
      border-radius:16px;
      border:1px solid rgba(148,163,184,.18);
      background:rgba(2,6,23,.40);
    }
    .rw-bt-msg{ max-width:92%; padding:12px 14px; border-radius:14px; line-height:1.5; font-size:15px; white-space:pre-wrap; }
    .rw-bt-msg-bot{ background:rgba(15,23,42,.92); border:1px solid rgba(148,163,184,.32); color:var(--rw-text); }
    .rw-bt-msg-user{ margin-left:auto; background:rgba(99,102,241,.95); color:#06101d; font-weight:900; }
    .rw-bt-typing{ margin-top:8px; color:var(--rw-muted); font-size:13px; padding:0 6px; }
    .rw-bt-input{ display:flex; gap:8px; margin-top:10px; }
    .rw-bt-input input{ flex:1; padding:12px 14px; border-radius:999px; border:1px solid rgba(148,163,184,.22); background:rgba(2,6,23,.75); color:var(--rw-text); font-size:15px; outline:none; }
    .rw-bt-input button{ padding:12px 14px; border-radius:999px; border:none; background:rgba(99,102,241,.95); color:#06101d; font-weight:1000; cursor:pointer; box-shadow:0 0 16px rgba(99,102,241,.45); }
    .rw-bt-input button:disabled{ opacity:.6; cursor:not-allowed; }

    @media (max-width:768px){
      #rw-bt-launcher{ left:12px; right:12px; bottom:16px; justify-content:center; }
      #rw-bt-panel{ left:10px; right:10px; width:auto; bottom:86px; max-height:76vh; }
    }
  </style>
</head>
<body>
  <div id="rw-bt-launcher" aria-label="Ouvrir l'assistant" role="button">
    <span class="rw-bt-icon">🎮</span>
    <span class="rw-bt-label" id="rw-launcher-label">Assistant IA B.T</span>
  </div>

  <div id="rw-bt-panel" aria-hidden="true">
    <div class="rw-bt-header">
      <div class="rw-bt-title" id="rw-title">Assistant Retroworld</div>
      <button type="button" id="rw-bt-close" class="rw-bt-close" aria-label="Fermer">✕</button>
    </div>

    <div class="rw-bt-tabs">
      <button type="button" class="rw-bt-tab rw-bt-tab-active" data-tab="faq">FAQ</button>
      <button type="button" class="rw-bt-tab" data-tab="chat">Chat</button>
    </div>

    <div class="rw-bt-body rw-bt-body-active" id="rw-bt-body-faq">
      <div class="rw-faq-searchWrap">
        <div class="rw-faq-searchIcon">🔎</div>
        <input id="rw-faq-search" type="text" placeholder="Rechercher dans la FAQ (ex: tarifs, goûter, horaires…)" autocomplete="off" />
        <button type="button" id="rw-faq-clear" class="rw-faq-clear" aria-label="Effacer">✕</button>
      </div>

      <div class="rw-faq-meta">
        <span id="rw-faq-count">0</span> résultat(s)
      </div>

      <div class="rw-faq-list" id="rw-faq-list"></div>

      <div class="rw-faq-empty" id="rw-faq-empty" style="display:none;">
        Aucun résultat. Essayez “tarifs”, “anniversaire”, “fidélité”…<br>
        Ou passez sur l’onglet <strong>Chat</strong> pour une réponse personnalisée.
      </div>

      <div class="rw-faq-answer" id="rw-faq-answer">Sélectionnez une question pour afficher la réponse.</div>
    </div>

    <div class="rw-bt-body" id="rw-bt-body-chat">
      <div class="rw-bt-messages" id="rw-bt-messages"></div>
      <div class="rw-bt-typing" id="rw-bt-typing" style="display:none;">B.T écrit…</div>

      <form class="rw-bt-input" id="rw-bt-form">
        <input id="rw-bt-input" type="text" placeholder="Écrivez votre message…" autocomplete="off" />
        <button type="submit" id="rw-bt-send">Envoyer</button>
      </form>
    </div>
  </div>

  <script>
  (function(){
    if (window.__rwBTWidgetLoaded) return;
    window.__rwBTWidgetLoaded = true;

    const BRAND_META = {
      retroworld: {title:'Assistant Retroworld', launcher:'Assistant IA B.T', hello:'Bonjour 👋 Je suis B.T. Dites-moi ce que vous souhaitez organiser (VR, Escape VR, quiz, goûter/anniversaire).'},
      runningman: {title:'Assistant Runningman', launcher:'Assistant IA Runningman', hello:'Bonjour 👋 Je vous aide pour Runningman (kids zone, action game, anniversaires).'},
      enigmaniac: {title:'Assistant Enigmaniac', launcher:'Assistant IA Enigmaniac', hello:'Bonjour 👋 Je vous guide pour les escape games Enigmaniac (décors réels).'}
    };

    const qs = new URLSearchParams(location.search);
    const brand = (qs.get('brand') || qs.get('brand_id') || localStorage.getItem('rw_widget_brand') || 'retroworld').toLowerCase();
    const safeBrand = BRAND_META[brand] ? brand : 'retroworld';
    localStorage.setItem('rw_widget_brand', safeBrand);

    function normalizeBaseUrl(v){ return (v || '').trim().replace(/\/$/, ''); }
    function detectApiBase(){
      const fromQuery = normalizeBaseUrl(qs.get('api') || qs.get('api_base') || qs.get('base_url'));
      const fromGlobal = normalizeBaseUrl(window.RW_IA_API_BASE || '');
      const fromStorage = normalizeBaseUrl(localStorage.getItem('rw_widget_api_base') || '');
      const base = fromQuery || fromGlobal || fromStorage || '';
      if (fromQuery) localStorage.setItem('rw_widget_api_base', fromQuery);
      return base;
    }

    const API_BASE = detectApiBase();
    const API_CHAT = (API_BASE ? API_BASE : '') + '/chat';
    const API_FAQ = (API_BASE ? API_BASE : '') + '/faq.json?brand_id=' + encodeURIComponent(safeBrand);

    const LS_CID = 'rw_conversation_id';
    let conversationId = localStorage.getItem(LS_CID) || '';

    const $ = (id)=>document.getElementById(id);

    function escapeHtml(s){
      return String(s)
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'",'&#039;');
    }

    function addMsg(text, who){
      const box = $('rw-bt-messages');
      const div = document.createElement('div');
      div.className = 'rw-bt-msg ' + (who === 'user' ? 'rw-bt-msg-user' : 'rw-bt-msg-bot');
      div.textContent = text;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    function setTab(tab){
      document.querySelectorAll('.rw-bt-tab').forEach((b)=>b.classList.toggle('rw-bt-tab-active', b.dataset.tab === tab));
      $('rw-bt-body-faq').classList.toggle('rw-bt-body-active', tab === 'faq');
      $('rw-bt-body-chat').classList.toggle('rw-bt-body-active', tab === 'chat');
      if(tab === 'faq') $('rw-faq-search').focus();
      if(tab === 'chat') $('rw-bt-input').focus();
    }

    function openPanel(){
      $('rw-bt-panel').classList.add('rw-open');
      $('rw-bt-panel').setAttribute('aria-hidden','false');
    }
    function closePanel(){
      $('rw-bt-panel').classList.remove('rw-open');
      $('rw-bt-panel').setAttribute('aria-hidden','true');
    }

    let FAQ_ITEMS = [];

    function renderFaqList(query){
      const q = (query || '').trim().toLowerCase();
      const list = $('rw-faq-list');
      const empty = $('rw-faq-empty');
      const count = $('rw-faq-count');
      list.innerHTML = '';

      const filtered = FAQ_ITEMS.filter((item)=>{
        if(!q) return true;
        const hay = (item.q + ' ' + item.tags.join(' ') + ' ' + item.a).toLowerCase();
        return hay.includes(q);
      });

      count.textContent = String(filtered.length);
      if(filtered.length === 0){ empty.style.display = 'block'; return; }
      empty.style.display = 'none';

      filtered.forEach((item)=>{
        const el = document.createElement('div');
        el.className = 'rw-faq-item';
        el.innerHTML = '<div class="rw-faq-q">' + escapeHtml(item.q) + '</div>' +
          '<div class="rw-faq-tags">' + item.tags.slice(0,5).map((t)=>'<span class="rw-faq-tag">'+escapeHtml(t)+'</span>').join('') + '</div>';
        el.addEventListener('click', ()=>{ $('rw-faq-answer').textContent = item.a; });
        list.appendChild(el);
      });
    }

    async function loadFAQ(){
      $('rw-faq-answer').textContent = 'Chargement de la FAQ…';
      try{
        const r = await fetch(API_FAQ, { method:'GET', headers:{ 'Accept':'application/json' } });
        const data = await r.json();
        const items = (data && data.items) ? data.items : [];
        FAQ_ITEMS = (Array.isArray(items) ? items : []).map((it)=>(
          {q:String(it.question || ''), a:String(it.answer || ''), tags:Array.isArray(it.tags) ? it.tags.map((t)=>String(t)) : []}
        )).filter((it)=>it.q.trim() && it.a.trim());
        renderFaqList('');
        $('rw-faq-answer').textContent = 'Sélectionnez une question pour afficher la réponse.';
      }catch(e){
        FAQ_ITEMS = [];
        renderFaqList('');
        $('rw-faq-answer').textContent = 'FAQ indisponible pour le moment. Passez sur l’onglet Chat.';
      }
    }

    async function sendChat(text){
      $('rw-bt-typing').style.display = 'block';
      $('rw-bt-send').disabled = true;
      try{
        const r = await fetch(API_CHAT, {
          method:'POST',
          headers:{ 'Content-Type':'application/json' },
          body: JSON.stringify({
            message:text,
            conversation_id: conversationId || undefined,
            brand_id: safeBrand,
            metadata:{ source:'retroworld_widget_style', page_url: location.href }
          })
        });
        const data = await r.json();
        if(data && data.conversation_id){
          conversationId = data.conversation_id;
          localStorage.setItem(LS_CID, conversationId);
        }
        addMsg((data.answer || data.reply || 'Je n’ai pas pu obtenir la réponse.'), 'bot');
      }catch(e){
        addMsg('Je rencontre un souci de connexion. Réessayez dans un instant.', 'bot');
      }finally{
        $('rw-bt-typing').style.display = 'none';
        $('rw-bt-send').disabled = false;
      }
    }

    function init(){
      $('rw-title').textContent = BRAND_META[safeBrand].title;
      $('rw-launcher-label').textContent = BRAND_META[safeBrand].launcher;
      addMsg(BRAND_META[safeBrand].hello + (API_BASE ? ('\n\n🔌 API: ' + API_BASE) : ''), 'bot');

      $('rw-bt-launcher').addEventListener('click', ()=>{
        const panel = $('rw-bt-panel');
        panel.classList.contains('rw-open') ? closePanel() : openPanel();
      });
      $('rw-bt-close').addEventListener('click', closePanel);

      document.querySelectorAll('.rw-bt-tab').forEach((b)=>b.addEventListener('click', ()=>setTab(b.dataset.tab)));

      $('rw-bt-form').addEventListener('submit', (e)=>{
        e.preventDefault();
        const inp = $('rw-bt-input');
        const txt = (inp.value || '').trim();
        if(!txt) return;
        inp.value = '';
        setTab('chat');
        addMsg(txt, 'user');
        sendChat(txt);
      });

      const search = $('rw-faq-search');
      $('rw-faq-clear').addEventListener('click', ()=>{ search.value = ''; renderFaqList(''); search.focus(); });
      search.addEventListener('input', ()=>renderFaqList(search.value));

      loadFAQ();
      setTab((qs.get('tab') || 'faq').toLowerCase() === 'chat' ? 'chat' : 'faq');
    }

    if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
    else init();
  })();
  </script>
</body>
</html>
